name: Release

on:
  push:
    tags:
      - 'v*'

# Default to read-only; the publish job opts into exactly what it needs:
#   contents: write   → create the GitHub Release
#   id-token: write   → mint the OIDC token for npm publish provenance
permissions:
  contents: read

# Gate: typecheck → build → test → publish → GitHub Release
jobs:
  gate:
    runs-on: ubuntu-latest
    # build + typecheck + full vitest suite on a cold runner can run long;
    # 20m was too tight and timed out mid-test. 45m leaves comfortable margin.
    timeout-minutes: 45
    permissions:
      contents: write
      id-token: write
    env:
      # actions/checkout, actions/setup-node, pnpm/action-setup are pinned to
      # SHA revisions that still default to Node 20, but Node 20 segfaults
      # `tsup` during `pnpm build` on Linux. Force them onto Node 24 so the
      # build can complete — the setup-node step below still pins the
      # build/runtime to Node 22 via the `node-version` input.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      # Pinned to full commit SHAs — see ci.yml for rationale.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 (resolved 2026-05-29)

      # pnpm version from package.json "packageManager" (single source of truth).
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4 (resolved 2026-05-29)

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4 (resolved 2026-05-29)
        with:
          # `tsup` 8.5.1 segfaults on Node 22 during the first `pnpm build` on
          # cold Linux runners (exit null). Pin to Node 24 — the consumer-facing
          # `engines.node` requirement in package.json is `>=22.19.0`, so any
          # consumer on Node 22 is still supported at runtime, but the build
          # itself needs Node 24 to complete. Local dev (Node 22.13/24.x) is
          # unaffected.
          node-version: 24
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Dependency Audit (moderate+)
        run: pnpm audit --audit-level=moderate

      # Build first: cross-package typecheck resolves types via dist/*.d.ts.
      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches package versions
        run: |
          TAG_VERSION="${{ steps.version.outputs.VERSION }}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "ERROR: Tag version ($TAG_VERSION) does not match package.json ($PKG_VERSION)"
            echo "Run: node scripts/bump-version.mjs set $TAG_VERSION"
            exit 1
          fi

      - name: Publish to npm
        # --provenance: with id-token:write granted, npm attaches a signed
        # provenance attestation linking the package to this workflow run +
        # commit, so consumers can verify it was built here and not tampered.
        run: pnpm -r publish --provenance --no-git-checks --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2 (resolved 2026-05-29)
        with:
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
