name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: CI only reads the repo (no writes, comments, or token use).
# Overriding the default token scope shrinks the blast radius if a build step
# or a third-party action is compromised.
permissions:
  contents: read

# L3-D: the gate. build → typecheck → test must ALL be green for the branch
# to be mergeable. Build runs FIRST: packages resolve each other's types via
# their published dist/*.d.ts (workspace exports), so cross-package typecheck
# (e.g. @wrongstack/acp importing @wrongstack/core) needs the dts to exist.
# Test then depends on the same build artifacts. Failing any step fails the run.

jobs:
  gate:
    strategy:
      # Don't cancel the other OS legs when one fails — we want every
      # platform's result (a flake on one runner shouldn't mask the rest).
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      # Third-party actions pinned to full commit SHAs (not mutable tags) so a
      # compromised/retagged release can't silently run new code in CI.
      # Comment records the major tag + resolution date for easy review/bump.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 (resolved 2026-05-29)

      # pnpm version comes from package.json's "packageManager" field (single
      # source of truth) — passing a `version:` input too is now rejected by
      # action-setup as a conflict.
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4 (resolved 2026-05-29)

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4 (resolved 2026-05-29)
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (all packages)
        run: pnpm build

      - name: Typecheck (all packages, parallel)
        run: pnpm typecheck

      # TEMPORARY hang diagnostic. Step-level timeout-minutes does NOT kill a
      # hung child whose stdout pipe stays open, so we force-kill vitest from
      # INSIDE the step with coreutils `timeout` (direct node invocation, output
      # to a file — no pipe to keep alive). The step then exits 0, so the job
      # completes and its logs are RETAINED (a job-timeout cancel loses them).
      # A custom reporter logs each module's START/END; the file with a START
      # and no matching END is the leak. Windows has no `timeout` coreutils and
      # already passes, so this diagnostic only runs on POSIX.
      - name: Test (vitest)
        shell: bash
        run: |
          set +e
          if command -v timeout >/dev/null 2>&1; then
            timeout -s KILL 660 node ./node_modules/vitest/vitest.mjs run \
              --reporter=default --reporter=./scripts/hang-probe-reporter.mjs > vitest-out.log 2>&1
            echo "vitest exit code: $?"
            echo "==== files that STARTed but never ENDed (THE HANG) ===="
            comm -23 \
              <(grep '\[probe\] START' vitest-out.log | sed 's#.*START ##' | sort -u) \
              <(grep '\[probe\] END'   vitest-out.log | sed 's#.*END   ##' | sort -u)
            echo "==== last 50 lines ===="
            tail -n 50 vitest-out.log
            exit 0
          else
            pnpm test
          fi
