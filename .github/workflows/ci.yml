name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: CI only reads the repo (no writes, comments, or token use).
# Overriding the default token scope shrinks the blast radius if a build step
# or a third-party action is compromised.
permissions:
  contents: read

# L3-D: the gate. build → typecheck → lint → test → audit must ALL be green
# for the branch to be mergeable. Build runs FIRST: packages resolve each
# other's types via their published dist/*.d.ts (workspace exports), so
# cross-package typecheck needs the dts to exist. Test then depends on the
# same build artifacts. Failing any step fails the run.

jobs:
  gate:
    strategy:
      # Don't cancel the other OS legs when one fails — we want every
      # platform's result (a flake on one runner shouldn't mask the rest).
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      # Third-party actions pinned to full commit SHAs (not mutable tags) so a
      # compromised/retagged release can't silently run new code in CI.
      # Comment records the major tag + resolution date for easy review/bump.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4 (2025-06)

      # pnpm version comes from package.json's "packageManager" field (single
      # source of truth) — passing a `version:` input too is now rejected by
      # action-setup as a conflict.
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4 (resolved 2026-05-29)

      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4 (2025-06)
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build (all packages)
        run: pnpm build

      - name: Typecheck (all packages, parallel)
        run: pnpm typecheck

      - name: Lint (biome)
        run: pnpm lint

      - name: Lint (distributive types review)
        run: pnpm lint:distributive

      - name: Test (vitest)
        run: pnpm test

      - name: Dependency Audit (high+)
        run: pnpm audit --audit-level=high
