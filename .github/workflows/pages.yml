name: Deploy Website

# Builds the marketing/docs site in website/ and publishes it to GitHub Pages
# at the apex domain wrongstack.com (CNAME lives in website/public/CNAME, which
# Vite copies into the build output). Pages "Source" must be set to
# "GitHub Actions" in the repository settings for this to deploy.

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# Least privilege: read the repo, plus the two scopes Pages deployment needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time. Don't cancel an in-flight deploy — a half-
# applied deployment is worse than waiting for the previous one to finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # Third-party actions pinned to full commit SHAs (see ci.yml for rationale).
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 (resolved 2026-05-29)

      # The website is a standalone npm project (its own package-lock.json), not
      # part of the pnpm workspace — so it builds with npm, cached on its lockfile.
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4 (resolved 2026-05-29)
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json

      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5 (resolved 2026-05-29)

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Build
        working-directory: website
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3 (resolved 2026-05-29)
        with:
          path: website/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4 (resolved 2026-05-29)
